<!DOCTYPE html>
<html>
<head>
    <title>Mouse Wheel Test</title>
    <style>
        #scroll-area {
            width: 200px;
            height: 200px;
            overflow: auto;
            background: #eee;
            border: 1px solid #ccc;
        }
        #spacer {
            height: 1000px;
            width: 1000px;
            background: linear-gradient(to bottom right, #fff, #ccc);
        }
    </style>
</head>
<body>
    <div id="scroll-area">
        <div id="spacer">Scroll me</div>
    </div>
    <div id="status">No wheel event recorded</div>
    <script>
        const area = document.getElementById('scroll-area');
        const status = document.getElementById('status');

        area.addEventListener('wheel', (e) => {
            status.innerText = `DeltaX: ${Math.round(e.deltaX)}, DeltaY: ${Math.round(e.deltaY)}`;
        });
    </script>
</body>
</html>
