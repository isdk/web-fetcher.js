<!DOCTYPE html>
<html>
<head>
    <title>Mouse Wheel Multiple Test</title>
</head>
<body>
    <div id="status">Total DeltaY: 0</div>
    <script>
        const status = document.getElementById('status');
        let totalDeltaY = 0;

        window.addEventListener('wheel', (e) => {
            totalDeltaY += e.deltaY;
            status.innerText = `Total DeltaY: ${Math.round(totalDeltaY)}`;
        });
    </script>
</body>
</html>
