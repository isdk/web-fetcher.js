<!DOCTYPE html>
<html>
<style>
  .btn { width: 100px; height: 50px; margin: 10px; }
  #far { margin-top: 100px; display: block; }
</style>
<body>
  <div id="status">Ready</div>
  <button id="near" class="btn" onclick="document.getElementById('status').innerText = 'Near Clicked'">Near</button>
  <button id="far" class="btn" onclick="document.getElementById('status').innerText = 'Far Clicked'">Far</button>
</body>
</html>
